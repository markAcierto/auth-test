<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pulse — Build the boring parts</title>
  <link rel="stylesheet" href="/src/styles.css"> <!-- NEW -->
</head>

<section id="auth-demo" class="py-24 px-6">
  <div class="max-w-3xl mx-auto text-center">
    <h2 class="text-4xl md:text-6xl font-bold mb-6">WebAuthn <span class="text-blue-500">in action.</span></h2>
    <p class="text-xl opacity-70 mb-12">Create a real passkey right here. No password, no SMS codes — just your device's built-in authenticator.</p>

    <div class="glass p-8 rounded-3xl text-left relative">
      <div class="absolute -top-3 left-6 bg-blue-600 text-white text-xs px-3 py-1 rounded-full font-bold">LIVE DEMO</div>
      <div id="auth-status" class="mb-8 p-4 bg-white/5 rounded-xl text-sm font-mono min-h-[60px]">Ready to register...</div>

      <div class="flex flex-wrap gap-4">
        <button id="create-passkey" class="px-8 py-4 rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 active:scale-95 transition">Create Passkey</button>
        <button id="get-passkey" disabled class="px-8 py-4 rounded-xl border border-white/10 font-bold opacity-40 cursor-not-allowed">Verify Passkey</button>
      </div>

      <div id="auth-debug" class="mt-8 pt-6 border-t border-white/5 font-mono text-[10px] opacity-50 overflow-x-auto whitespace-pre"></div>
    </div>
    
    <p class="mt-16 text-sm opacity-50">
      Note: WebAuthn requires HTTPS (or localhost). If you open this as a local file (file://), the API is disabled by the browser.
    </p>
  </div>
</section>

<script>
  const createBtn = document.getElementById('create-passkey');
  const getBtn = document.getElementById('get-passkey');
  const status = document.getElementById('auth-status');
  const debug = document.getElementById('auth-debug');

  const log = (...args) => {
    status.textContent = args[0] || '...';
    debug.textContent = JSON.stringify({ t: new Date().toLocaleTimeString(), ...args }, null, 2);
  };

  // A fake challenge and rpId — in production these come from your backend
  const challenge = new TextEncoder().encode(crypto.randomUUID());
  const rpId = window.location.hostname || 'localhost';

  createBtn.addEventListener('click', async () => {
    try {
      log('Calling navigator.credentials.create', { id: 'create-passkey' });
      const options = {
        publicKey: {
          challenge,
          rp: { name: 'Pulse Demo', id: rpId },
          user: {
            id: crypto.randomUUID(),
            name: 'demo_user',
            displayName: 'Demo User',
          },
          pubKeyCredParams: [
            { type: 'public-key', alg: -7 },    /* ES256 */
            { type: 'public-key', alg: -257 },   /* Ed25519 */
            { type: 'public-key', alg: -263 },   /* ES384 */
          ],
          authenticatorSelection: {
            residentKey: 'preferred',
            userVerification: 'preferred',
          },
        },
      };

      const credential = await navigator.credentials.create(options);
      log('Passkey created! ID:', credential.id.slice(0, 16), '...', credential.id.slice(-16));
      getBtn.disabled = false;
      getBtn.classList.remove('opacity-40', 'cursor-not-allowed');
    } catch (e) {
      const msg = e.name === 'NotAllowedError' && window.location.protocol === 'file:'
        ? 'WebAuthn is disabled over file://. Use HTTPS/localhost.'
        : e.message;
      log('Error:', msg);
      createBtn.disabled = false;
      createBtn.classList.remove('opacity-40');
    }
  });

  getBtn.addEventListener('click', async () => {
    try {
      log('Calling navigator.credentials.get', { id: 'get-passkey' });
      const options = {
        publicKey: {
          challenge,
          rpId,
          allowCredentials: [{ id: '...', type: 'public-key' }], // In real apps, fetch this ID from your DB
          userVerification: 'preferred',
        },
      };
      const result = await navigator.credentials.get(options);
      log('Verified credential:', result?.id?.slice(0, 16), '...');
    } catch (e) {
      log('Replay/Verification error:', e.message);
    }
  });
</script>
